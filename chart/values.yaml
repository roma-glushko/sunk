openldap:
  image:
    repository: osixia/openldap
    tag: "1.5.0"
  rootDN: "dc=sunk,dc=local"
  adminPassword: admin
  users:
    - username: research
      uid: 10001
      gid: 10001
      password: pass
      sshPublicKey: ""
  groups: []
  # groups:
  #   - name: researchers
  #     gid: 20001
  #     members:
  #       - research

slurm:
  clusterName: sunk

  # config holds key/value pairs mounted as files into /etc/slurm via a ConfigMap.
  # Keys become filenames (e.g. gres.conf, topology.conf).
  # Omit this section entirely to skip ConfigMap creation.
  # config:
  #   gres.conf: |
  #     AutoDetect=nvml

  controller:
    slurmctld:
      image:
        repository: ghcr.io/slinkyproject/slurmctld
        tag: 26.05-ubuntu26.04
    reconfigure:
      image:
        repository: ghcr.io/slinkyproject/slurmctld
        tag: 26.05-ubuntu26.04
    persistence:
      storageClassName: null
      size: 4Gi

  accounting:
    enabled: true
    slurmdbd:
      image:
        repository: ghcr.io/slinkyproject/slurmdbd
        tag: 26.05-ubuntu26.04
    storageConfig:
      host: mariadb
      port: 3306
      database: slurm_acct_db
      username: slurm
      passwordSecretRef:
        name: mariadb-password
        key: password

  loginsets:
    login:
      enabled: true
      replicas: 1
      serviceType: LoadBalancer
      login:
        image:
          repository: ghcr.io/slinkyproject/login
          tag: 26.05-ubuntu26.04

  nodesets:
    workers:
      enabled: true
      replicas: 1
      slurmd:
        image:
          repository: ghcr.io/slinkyproject/slurmd
          tag: 26.05-ubuntu26.04
      partition:
        enabled: true
